services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ghostnet
      POSTGRES_PASSWORD: ghostnet_dev
      POSTGRES_DB: ghostnet
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ghostnet -d ghostnet"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ghostnet
      MINIO_ROOT_PASSWORD: ghostnet_dev
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://ghostnet:ghostnet_dev@postgres:5432/ghostnet
      REDIS_URL: redis://redis:6379
      API_URL: http://localhost:3000
      APP_URL: http://localhost:5173
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  deception:
    build:
      context: ..
      dockerfile: apps/deception/Dockerfile
    env_file:
      - ../.env
    environment:
      REDIS_URL: redis://redis:6379
      DECEPTION_BASE_URL: http://localhost:4000
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
    ports:
      - "4000:4000"
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  worker:
    build:
      context: ..
      dockerfile: apps/worker/Dockerfile
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://ghostnet:ghostnet_dev@postgres:5432/ghostnet
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  minio_data:
